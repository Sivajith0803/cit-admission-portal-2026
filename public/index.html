<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Admission Portal 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0.5)), 
                        url('./sample.jpg'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            border-radius: 20px; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* --- Updated Header with Logo --- */
        .card-header {
            background: rgba(60, 70, 90, 0.98) !important;
            border-bottom: none;
            padding: 20px !important;
        }

        .college-logo {
            width: 65px;
            height: 65px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        .header-title {
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .header-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 0;
        }

        /* --- Sections & Labels --- */
        .section-title { 
            border-left: 5px solid #5a7d9a; 
            padding-left: 12px; 
            margin: 25px 0 15px 0; 
            color: #3c465a; 
            font-weight: 700; 
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #4a5568;
        }

        /* --- Merit Display Box --- */
        .merit-container {
            background: #edf2f7;
            border-radius: 10px;
            padding: 15px 25px;
            border: 1px solid #e2e8f0;
        }

        .avg-score-text {
            color: #2b6cb0;
            font-weight: 800;
            font-size: 1.8rem;
        }

        .btn-primary {
            background-color: #5a7d9a;
            border: none;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .btn-primary:hover {
            background-color: #3c465a;
            transform: translateY(-2px);
        }

        #photoPreview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid #cbd5e0;
            margin-top: 5px;
        }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="card glass-card shadow-lg col-md-10 mx-auto">
            <div class="card-header text-white">
                <div class="d-flex align-items-center justify-content-center gap-3">
                    <img src="./logo.png" alt="Logo" class="college-logo">
                    <div class="text-center">
                        <h2 class="header-title">City Institute of Technology</h2>
                        <h3 class="header-subtitle">🏛️ University Admission Portal 2026</h3>
                    </div>
                </div>
            </div>

            <div class="card-body p-4 p-lg-5">
                <form id="admissionForm">
                    <div class="row">
                        <h5 class="section-title">Personal Information</h5>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                        </div>

                        <h5 class="section-title">Program Selection</h5>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Applying for</label>
                            <select name="level" id="levelSelect" class="form-select" onchange="handleLevelChange()" required>
                                <option value="">-- Select Level --</option>
                                <option value="UG">Undergraduate (Engineering)</option>
                                <option value="PG">Postgraduate (Management/IT)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Select Course</label>
                            <select name="course" id="courseSelect" class="form-select" required>
                                <option value="">-- First Select Level --</option>
                            </select>
                        </div>

                        <div id="ugMarksSection" class="row d-none">
                            <h5 class="section-title text-primary">HSC (12th) Academic Score</h5>
                            <div class="col-md-3 mb-3"><label class="small fw-bold">Maths</label><input type="number" id="m1" class="form-control mark-input" value="0"></div>
                            <div class="col-md-3 mb-3"><label class="small fw-bold">Physics</label><input type="number" id="m2" class="form-control mark-input" value="0"></div>
                            <div class="col-md-3 mb-3"><label class="small fw-bold">Chemistry</label><input type="number" id="m3" class="form-control mark-input" value="0"></div>
                            <div class="col-md-3 mb-3"><label class="small fw-bold">CS / Bio</label><input type="number" id="m4" class="form-control mark-input" value="0"></div>
                        </div>

                        <div id="pgMarksSection" class="row d-none">
                            <h5 class="section-title text-primary">Undergraduate Records</h5>
                            <div class="col-md-8 mb-3">
                                <label class="small fw-bold">Previous Degree</label>
                                <input type="text" name="prev_degree" class="form-control" placeholder="BSc / BTech / BCom">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="small fw-bold">Final CGPA</label>
                                <input type="number" step="0.01" id="cgpaInput" class="form-control" placeholder="0.00">
                            </div>
                        </div>

                        <div class="col-12 mb-4 mt-2">
                            <div class="merit-container d-flex justify-content-between align-items-center shadow-sm">
                                <span class="fw-bold text-secondary">Aggregate Merit Score:</span>
                                <div class="text-end">
                                    <h3 class="mb-0 avg-score-text" id="avgDisplay">0.00%</h3>
                                    <input type="hidden" name="marks" id="hiddenAvg">
                                </div>
                            </div>
                            <div id="scholarshipStatus" class="alert alert-success mt-2 py-2" style="display:none">
                                ✨ <span id="schText" class="small fw-bold"></span>
                                <input type="hidden" name="scholarship_percent" id="hiddenSchPercent" value="0">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Candidate Photo</label>
                            <div class="d-flex align-items-center gap-3">
                                <input type="file" name="photo" id="photoInput" class="form-control" accept="image/*" required>
                                <img id="photoPreview" src="#" alt="Preview" style="display: none;">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Scholarship Claimed?</label>
                            <input type="text" name="scholarship" id="schStatusField" class="form-control bg-light fw-bold" value="No" readonly>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-lg mt-3 text-uppercase">Finalize & Proceed to Payment</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function handleLevelChange() {
            const level = document.getElementById('levelSelect').value;
            const courseSelect = document.getElementById('courseSelect');
            const ugSection = document.getElementById('ugMarksSection');
            const pgSection = document.getElementById('pgMarksSection');
            
            courseSelect.innerHTML = '<option value="">-- Select Course --</option>';

            if (level === "UG") {
                ["Computer Science Engineering", "IT Engineering", "Mechanical Engineering", "Civil Engineering"].forEach(c => {
                    courseSelect.innerHTML += `<option value="${c}">${c}</option>`;
                });
                ugSection.classList.remove('d-none');
                pgSection.classList.add('d-none');
            } else if (level === "PG") {
                ["MCA (Computer Applications)", "MBA (Business Administration)"].forEach(c => {
                    courseSelect.innerHTML += `<option value="${c}">${c}</option>`;
                });
                pgSection.classList.remove('d-none');
                ugSection.classList.add('d-none');
            }
            calculateLogic();
        }

        function calculateLogic() {
            const level = document.getElementById('levelSelect').value;
            let finalScore = 0;
            let schPercent = 0;

            if (level === "UG") {
                let m1 = parseFloat(document.getElementById('m1').value) || 0;
                let m2 = parseFloat(document.getElementById('m2').value) || 0;
                let m3 = parseFloat(document.getElementById('m3').value) || 0;
                let m4 = parseFloat(document.getElementById('m4').value) || 0;
                finalScore = (m1 + m2 + m3 + m4) / 4;
                if (finalScore >= 90) schPercent = 50;
                else if (finalScore >= 80) schPercent = 25;
            } else if (level === "PG") {
                let cgpa = parseFloat(document.getElementById('cgpaInput').value) || 0;
                finalScore = cgpa * 10; 
                if (cgpa >= 9.0) schPercent = 50;
                else if (cgpa >= 8.0) schPercent = 25;
            }

            document.getElementById('avgDisplay').innerText = finalScore.toFixed(2) + "%";
            document.getElementById('hiddenAvg').value = finalScore.toFixed(2);

            const schBadge = document.getElementById('scholarshipStatus');
            const schStatusField = document.getElementById('schStatusField');
            
            if (schPercent > 0) {
                schBadge.style.display = 'block';
                document.getElementById('schText').innerText = `Eligible for ${schPercent}% Merit Scholarship!`;
                document.getElementById('hiddenSchPercent').value = schPercent;
                schStatusField.value = "Yes (" + schPercent + "%)";
            } else {
                schBadge.style.display = 'none';
                document.getElementById('hiddenSchPercent').value = 0;
                schStatusField.value = "No";
            }
        }

        document.getElementById('photoInput').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                const preview = document.getElementById('photoPreview');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        };

        document.querySelectorAll('.mark-input, #cgpaInput').forEach(input => {
            input.addEventListener('input', calculateLogic);
        });

        document.getElementById('admissionForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const response = await fetch('/submit', { method: 'POST', body: formData });
                const result = await response.json();
                if(result.success) {
                    window.location.href = `/payment.html?id=${result.id}&name=${encodeURIComponent(result.name)}`;
                } else {
                    alert("Submission failed.");
                }
            } catch (err) {
                alert("Server offline. Please start Node.js.");
            }
        };

        window.onload = handleLevelChange;
    </script>
</body>
</html>
